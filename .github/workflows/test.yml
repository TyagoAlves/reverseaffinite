name: Test

on:
  push:
    branches: [main, phase-3, feature/*]
  pull_request:
    branches: [main, phase-3]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 xvfb

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-qt

      - name: Run tests with xvfb
        run: |
          xvfb-run python3 -m pytest tests/ \
            --cov=editor \
            --cov-report=term \
            --cov-report=xml \
            -v --tb=short \
            -m 'not slow and not stress and not perf'

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml
